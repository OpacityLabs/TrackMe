name: Build & Push TrackMe Docker Image

on:
  push:
    branches:
      - master
      - develop
      - staging

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    runs-on: dind-scale-set-secure

    env:
      GAR_HOST: us-central1-docker.pkg.dev
      GAR_PROJECT_ID: opacity-labs-project
      GCP_SERVICE_ACCOUNT: github-actions-gar-writer@opacity-labs-project.iam.gserviceaccount.com
      GCP_WORKLOAD_IDENTITY_PROVIDER: projects/860260621424/locations/global/workloadIdentityPools/github-actions/providers/opacitylabs-repos
      IMAGE_REPO: us-central1-docker.pkg.dev/opacity-labs-project/opacitylabs/trackme

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set build vars
        id: vars
        shell: sh
        run: |
          # Build tags based on branch
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          DATE="$(date -u +%Y%m%d)"
          case "${GITHUB_REF_NAME}" in
            master)    CHANNEL_TAG="latest"  ;;
            develop)     CHANNEL_TAG="develop"     ;;
            staging) CHANNEL_TAG="staging" ;;
            *) echo "Unsupported branch: ${GITHUB_REF_NAME}"; exit 1 ;;
          esac
          echo "SHORT_SHA=${SHORT_SHA}"     >> "$GITHUB_ENV"
          echo "CHANNEL_TAG=${CHANNEL_TAG}" >> "$GITHUB_ENV"
          echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${IMAGE_REPO##*/}" >> "$GITHUB_ENV"
          echo "TRIVY_IMAGE_REF=${IMAGE_REPO}:${CHANNEL_TAG}-${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "TRIVY_REPORT_FILE=trivy-report-trackme.txt" >> "$GITHUB_ENV"
          echo "TRIVY_JSON_REPORT_FILE=trivy-report-trackme.json" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GAR_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build image (multi-tag)
        run: |
          echo "Building ${IMAGE_REPO}:${CHANNEL_TAG}"
          docker build \
            --label org.opencontainers.image.revision="${GITHUB_SHA}" \
            --label org.opencontainers.image.source="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            -t "${IMAGE_REPO}:${CHANNEL_TAG}" \
            -t "${IMAGE_REPO}:${CHANNEL_TAG}-${SHORT_SHA}" \
            -f Dockerfile .
      - name: Run Trivy vulnerability scan (report only)
        id: trivy
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          scan-type: image
          image-ref: ${{ env.TRIVY_IMAGE_REF }}
          format: table
          output: ${{ env.TRIVY_REPORT_FILE }}
          exit-code: '0'
          vuln-type: os,library
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          scanners: vuln

      - name: Run Trivy vulnerability scan JSON (report only)
        id: trivy_json
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          scan-type: image
          image-ref: ${{ env.TRIVY_IMAGE_REF }}
          format: json
          output: ${{ env.TRIVY_JSON_REPORT_FILE }}
          exit-code: '0'
          vuln-type: os,library
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          scanners: vuln

      - name: Summarize Trivy vulnerabilities
        id: trivy_summary
        if: ${{ always() && (steps.trivy.outcome == 'success' || steps.trivy.outcome == 'failure') }}
        run: |
          CRITICAL="unknown"
          HIGH="unknown"
          MEDIUM="unknown"
          LOW="unknown"
          UNKNOWN="unknown"
          TOTAL="unknown"

          if [ -s "${TRIVY_JSON_REPORT_FILE}" ]; then
            COUNTS="$(jq -r '
              [ .Results[]?.Vulnerabilities[]?.Severity ] as $severities |
              def count($severity): ([ $severities[] | select(. == $severity) ] | length);
              [
                count("CRITICAL"),
                count("HIGH"),
                count("MEDIUM"),
                count("LOW"),
                count("UNKNOWN"),
                ($severities | length)
              ] | @tsv
            ' "${TRIVY_JSON_REPORT_FILE}" 2>/dev/null || true)"

            if [ -n "${COUNTS}" ]; then
              set -- ${COUNTS}
              CRITICAL="${1:-0}"
              HIGH="${2:-0}"
              MEDIUM="${3:-0}"
              LOW="${4:-0}"
              UNKNOWN="${5:-0}"
              TOTAL="${6:-0}"
            fi
          fi

          {
            echo "critical=${CRITICAL}"
            echo "high=${HIGH}"
            echo "medium=${MEDIUM}"
            echo "low=${LOW}"
            echo "unknown=${UNKNOWN}"
            echo "total=${TOTAL}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Trivy report
        if: ${{ always() && (steps.trivy.outcome == 'success' || steps.trivy.outcome == 'failure') }}
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-trackme
          path: |
            ${{ env.TRIVY_REPORT_FILE }}
            ${{ env.TRIVY_JSON_REPORT_FILE }}
          if-no-files-found: ignore
          retention-days: 30

      - name: Publish Trivy report summary
        if: ${{ always() && (steps.trivy.outcome == 'success' || steps.trivy.outcome == 'failure') }}
        run: |
          {
            echo "### Trivy report-only scan"
            echo ""
            echo "- Report: ${REPO_NAME}/${IMAGE_NAME}"
            echo "- Image: ${TRIVY_IMAGE_REF}"
            echo "- Found ${{ steps.trivy_summary.outputs.critical }} critical"
            echo "- Found ${{ steps.trivy_summary.outputs.high }} high"
            echo "- Found ${{ steps.trivy_summary.outputs.medium }} medium"
            echo "- Found ${{ steps.trivy_summary.outputs.low }} low"
            echo "- Found ${{ steps.trivy_summary.outputs.unknown }} unknown"
            echo "- Total: ${{ steps.trivy_summary.outputs.total }}"
            echo "- Outcome: ${{ steps.trivy.outcome }}"
            echo "- Full report artifact: trivy-report-trackme"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Send Trivy report to Slack
        if: ${{ always() && (steps.trivy.outcome == 'success' || steps.trivy.outcome == 'failure') }}
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.TRIVY_WEBHOOK }}
          TRIVY_OUTCOME: ${{ steps.trivy.outcome }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "TRIVY_WEBHOOK is not set; skipping Slack notification."
            exit 0
          fi

          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          REPORT_SUBJECT="${REPO_NAME}/${IMAGE_NAME}"
          if [ -s "${TRIVY_REPORT_FILE}" ]; then
            REPORT_SNIPPET="$(head -c 2500 "${TRIVY_REPORT_FILE}")"
            REPORT_SIZE="$(wc -c < "${TRIVY_REPORT_FILE}" | tr -d ' ')"
            if [ "${REPORT_SIZE}" -gt 2500 ]; then
              REPORT_SNIPPET="$(printf '%s\n%s' "${REPORT_SNIPPET}" "...truncated; see the full trivy-report-trackme artifact in the workflow run.")"
            fi
          else
            REPORT_SNIPPET="No Trivy report file was generated. Check the workflow run for scanner logs."
          fi

          PAYLOAD="$(jq -n \
            --arg subject "${REPORT_SUBJECT}" \
            --arg image "${TRIVY_IMAGE_REF}" \
            --arg branch "${GITHUB_REF_NAME}" \
            --arg critical "${{ steps.trivy_summary.outputs.critical }}" \
            --arg high "${{ steps.trivy_summary.outputs.high }}" \
            --arg medium "${{ steps.trivy_summary.outputs.medium }}" \
            --arg low "${{ steps.trivy_summary.outputs.low }}" \
            --arg unknown "${{ steps.trivy_summary.outputs.unknown }}" \
            --arg total "${{ steps.trivy_summary.outputs.total }}" \
            --arg outcome "${TRIVY_OUTCOME}" \
            --arg run_url "${RUN_URL}" \
            --arg report "${REPORT_SNIPPET}" \
            '{
              text: (
                "Trivy report-only scan for " + $subject +
                "\nFound " + $critical + " critical" +
                "\nFound " + $high + " high" +
                "\nFound " + $medium + " medium" +
                "\nFound " + $low + " low" +
                "\nFound " + $unknown + " unknown" +
                "\nTotal: " + $total +
                "\nImage: " + $image +
                "\nBranch: " + $branch +
                "\nOutcome: " + $outcome +
                "\nFull report artifact: trivy-report-trackme" +
                "\nRun: " + $run_url +
                "\n```" + $report + "```"
              )
            }')"

          curl -sS -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "${PAYLOAD}"

      - name: Push tags
        run: |
          for TAG in "${CHANNEL_TAG}" "${CHANNEL_TAG}-${SHORT_SHA}"; do
            echo "Pushing ${IMAGE_REPO}:${TAG}"
            docker push "${IMAGE_REPO}:${TAG}"
          done
